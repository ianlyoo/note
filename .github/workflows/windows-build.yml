name: Build Windows zip app

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build Windows zip app
        run: npm run dist:win

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: Note-Windows-Zip
          path: release/*.zip
          if-no-files-found: error
